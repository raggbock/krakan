name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json web/package-lock.json
          npm install

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: web
        run: npx vitest run
