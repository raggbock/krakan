name: CI

on:
  # PAUSED: Actions usage cap reached. Re-enable push/pull_request triggers
  # at the start of the next billing cycle. workflow_dispatch keeps the
  # workflow runnable manually from the GitHub UI in the meantime.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json web/package-lock.json
          npm install

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: web
        run: npx vitest run

  # Typecheck all Supabase Edge Functions with Deno.
  # Pin to the Deno version shipped in Supabase Edge Runtime.
  # Track runtime releases at:
  # https://github.com/supabase/edge-runtime/releases
  deno-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: "1.45.5"

      - name: Deno check edge functions
        shell: bash
        # Use `find` instead of bash `**` so nested subdirs under
        # supabase/functions/<name>/ also get checked.
        run: find supabase/functions -name '*.ts' -print0 | xargs -0 deno check --config=supabase/functions/deno.json

  # Verify no edge function imports a non-allow-listed @fyndstigen/shared subpath.
  check-edge-imports:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check edge import surface
        run: node scripts/check-edge-imports.mjs

  lighthouse:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json web/package-lock.json
          npm install

      - name: Create env file
        working-directory: web
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      - name: Build
        working-directory: web
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
