name: E2E

on:
  # PAUSED: Actions usage cap reached. Re-enable push/pull_request triggers
  # at the start of the next billing cycle. Manual dispatch still works.
  workflow_dispatch:

# Browser-visible env needed so `supabase.ts` doesn't throw at module init
# in the browser during Playwright runs. Smoke tests only check static
# markup — no real network calls are made. The map profile swaps deps to
# in-memory via NEXT_PUBLIC_E2E_FAKE and never touches Supabase either.
env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoiYW5vbiJ9.placeholder

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json web/package-lock.json
          npm install

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: web
        run: npm run e2e:smoke

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-trace
          path: web/test-results/

  e2e-map:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json web/package-lock.json
          npm install

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run map tests
        working-directory: web
        run: npm run e2e:map

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-map-trace
          path: web/test-results/
